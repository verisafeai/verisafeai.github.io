<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — Making Autonomous Systems Verifiably Safe{% endif %}</title>
    <meta name="description" content="{{ site.description }}">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ site.title }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ "/assets_extracted/Logo_VeriSafe.png" | prepend: site.baseurl }}">

    <!-- Google Fonts: Inter + Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

    <!-- VeriSafe Styles -->
    <link rel="stylesheet" href="{{ "/css/verisafe.css" | prepend: site.baseurl }}">
</head>
